<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f97316" />
    <title>Няма връзка - NemeBook</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #fff8f1;
            color: #1f232b;
            font-family: Arial, sans-serif;
        }

        main {
            width: min(90vw, 420px);
            padding: 28px;
            border: 1px solid #f2d9c1;
            border-radius: 14px;
            background: #ffffff;
            box-shadow: 0 18px 45px rgba(42, 35, 29, 0.08);
            text-align: center;
        }

        strong {
            display: block;
            margin-bottom: 8px;
            color: #e95b0c;
            font-size: 22px;
        }

        p {
            margin: 0;
            color: #7a6f66;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main>
        <strong>NemeBook</strong>
        <p>Няма интернет връзка. Проверете мрежата и опитайте отново.</p>
    </main>
</body>
</html>

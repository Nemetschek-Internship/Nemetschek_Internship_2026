name: CI Build And Smoke

on:
  pull_request:
    paths:
      - "NemeBook/**"
      - ".github/workflows/ci-build-and-smoke.yml"
  push:
    branches:
      - "**"
    paths:
      - "NemeBook/**"
      - ".github/workflows/ci-build-and-smoke.yml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet-build-test:
    name: Dotnet Build And Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: NemeBook

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore NemeBook.sln

      - name: Build (Release)
        run: dotnet build NemeBook.sln --configuration Release --no-restore

      - name: Test (Release)
        run: dotnet test Tests/Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: NemeBook/Tests/TestResults/**/*.trx
          if-no-files-found: warn

  docker-compose-smoke:
    name: Docker Compose Smoke
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: NemeBook

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI Env File
        run: |
          cat > .env << 'EOF'
          MSSQL_SA_PASSWORD=Your_strong_password_123!
          ASPNETCORE_ENVIRONMENT=Development
          WEB_HOST_PORT=8081
          RegistrationEmail__BaseUrl=http://localhost:8081
          EOF

      - name: Build And Start Containers
        run: docker compose up --build -d

      - name: Wait For SQL Health
        run: |
          for i in {1..60}; do
            STATUS=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' nemebook-mssql 2>/dev/null || true)
            if [ "$STATUS" = "healthy" ]; then
              echo "SQL is healthy"
              exit 0
            fi
            echo "Waiting for SQL health... current=$STATUS"
            sleep 2
          done
          echo "SQL did not become healthy in time"
          docker compose logs mssql --tail 200
          exit 1

      - name: Verify Web Endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8081 > /dev/null; then
              echo "Web endpoint is reachable"
              exit 0
            fi
            echo "Waiting for web endpoint..."
            sleep 2
          done
          echo "Web endpoint did not become reachable"
          docker compose logs web --tail 200
          exit 1

      - name: Dump Logs On Failure
        if: failure()
        run: docker compose logs --tail 200

      - name: Stop Containers
        if: always()
        run: docker compose down

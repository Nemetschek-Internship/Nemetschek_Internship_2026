name: Deploy ASP.NET + MSSQL to DO Droplet

on:
  push:
    branches:
      - main
    paths:
      - "NemeBook/**"
      - ".github/workflows/deploy-do-droplet.yml"

env:
  DOCR_REGISTRY: registry.digitalocean.com/nemebookdocr
  DOCR_NAMESPACE: myapp
  WEB_IMAGE_NAME: nemebook-web
  MSSQL_IMAGE_NAME: nemebook-mssql
  REMOTE_DEPLOY_DIR: /home/root/nemebook

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to DOCR
        run: |
          echo "${{ secrets.DOCREDS }}" | docker login "${{ env.DOCR_REGISTRY }}" -u "${{ secrets.DOCREDS_USER }}" --password-stdin

      - name: Build and push MVC image
        run: |
          WEB_IMAGE="${{ env.DOCR_REGISTRY }}/${{ env.DOCR_NAMESPACE }}/${{ env.WEB_IMAGE_NAME }}:latest"
          docker build -t "$WEB_IMAGE" -f NemeBook/Web/Dockerfile NemeBook
          docker push "$WEB_IMAGE"

      - name: Build and push MSSQL image
        run: |
          MSSQL_IMAGE="${{ env.DOCR_REGISTRY }}/${{ env.DOCR_NAMESPACE }}/${{ env.MSSQL_IMAGE_NAME }}:latest"
          docker build -t "$MSSQL_IMAGE" -f NemeBook/Mssql/Dockerfile NemeBook/Mssql
          docker push "$MSSQL_IMAGE"

      - name: Upload droplet compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROP_HOST }}
          username: root
          key: ${{ secrets.DROP_SSH_KEY }}
          source: NemeBook/deploy/docker-compose.droplet.yml
          target: /home/root/nemebook
          strip_components: 2

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROP_HOST }}
          username: root
          key: ${{ secrets.DROP_SSH_KEY }}
          script: |
            set -e
            mkdir -p "${{ env.REMOTE_DEPLOY_DIR }}"
            cd "${{ env.REMOTE_DEPLOY_DIR }}"

            echo "${{ secrets.DOCREDS }}" | docker login "${{ env.DOCR_REGISTRY }}" -u "${{ secrets.DOCREDS_USER }}" --password-stdin

            export WEB_IMAGE="${{ env.DOCR_REGISTRY }}/${{ env.DOCR_NAMESPACE }}/${{ env.WEB_IMAGE_NAME }}:latest"
            export MSSQL_IMAGE="${{ env.DOCR_REGISTRY }}/${{ env.DOCR_NAMESPACE }}/${{ env.MSSQL_IMAGE_NAME }}:latest"

            docker compose -f docker-compose.droplet.yml pull
            docker compose -f docker-compose.droplet.yml up -d --renew-anon-volumes --remove-orphans
            docker image prune -f
